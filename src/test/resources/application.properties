# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Docker Compose in tests (TestContainers are used instead)
spring.docker.compose.enabled=false

# JWT Configuration for tests (no real Keycloak needed - jwt() MockMvc post-processor is used)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/realms/test/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9999/realms/test
auth.jwt.connect-timeout=1s
auth.jwt.read-timeout=1s
