services:
  postgres:
    image: 'postgres:18.3-alpine'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: 'quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_PORT}:9000'
      - '${MINIO_CONSOLE_PORT}:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # imgproxy:
  #   image: darthsim/imgproxy:latest
  #   environment:
  #     IMGPROXY_KEY: ... # ключи безопасности
  #     IMGPROXY_SALT: ...
  #     # Картинки брать из MinIO
  #     IMGPROXY_USE_S3: true
  #     IMGPROXY_S3_ENDPOINT: http://minio:9000
  #   ports:
  #     - "8080:8080"

  keycloak:
    image: 'quay.io/keycloak/keycloak:26.5'
    environment:
      # Base configuration
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8081
      # Database configuration
      KC_DB_URL: ${KEYCLOAK_DB_URL}
      KC_DB: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    command: start-dev --import-realm
    ports:
      - '${KEYCLOAK_PORT}:8081'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  keycloak_data:
