services:
  backend:
    build: .
    profiles:
      - with-backend
    environment:
      DATABASE_URL: ${BACKEND_DB_URL}
      DATABASE_USERNAME: ${POSTGRES_USERNAME}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: ${BACKEND_S3_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ROOT_USERNAME}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${BACKEND_S3_BUCKET_NAME}
      JWT_ISSUER_URI: ${BACKEND_JWT_ISSUER_URI}
      JWT_JWK_SET_URI: ${BACKEND_JWT_JWK_SET_URI}
    ports:
      - '${BACKEND_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health/readiness" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: 'postgres:18.3-alpine'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - ./init/postgres/:/docker-entrypoint-initdb.d/:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: 'quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_PORT}:9000'
      - '${MINIO_CONSOLE_PORT}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: 'quay.io/keycloak/keycloak:26.5'
    environment:
      # Base configuration
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      # Database configuration
      KC_DB_URL: ${KEYCLOAK_DB_URL}
      KC_DB: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    command: start-dev --import-realm
    ports:
      - '${KEYCLOAK_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;" ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  seed:
    build: ./seed
    profiles:
      - with-backend
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - postgres_data:/postgres
      - minio_data:/minio
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: "no"

volumes:
  postgres_data:
  minio_data:
  keycloak_data:
